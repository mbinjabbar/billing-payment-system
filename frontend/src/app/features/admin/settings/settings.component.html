<div class="bg-surface text-on-surface min-h-screen font-body">
  <div class="pt-10 px-10 pb-12 space-y-8 w-full">

    <!-- Page Header -->
    <section>
      <h2 class="text-4xl font-extrabold tracking-tight font-headline">Settings</h2>
      <p class="text-on-surface-variant mt-2 font-body">
        Manage master data, system configuration and application preferences.
      </p>
    </section>

    <!-- Tab Navigation -->
    <div class="flex gap-1 border-b border-outline-variant/20">
      <button (click)="setTab('procedures')"
        class="px-5 py-3 text-sm font-bold font-headline transition-all border-b-2 -mb-px"
        [class]="activeTab() === 'procedures'
          ? 'border-primary text-primary'
          : 'border-transparent text-on-surface-variant hover:text-on-surface'">
        <span class="flex items-center gap-2">
          <span class="material-symbols-outlined icon-sm">medical_services</span>
          Procedure Codes
        </span>
      </button>

      <button (click)="setTab('insurance')"
        class="px-5 py-3 text-sm font-bold font-headline transition-all border-b-2 -mb-px"
        [class]="activeTab() === 'insurance'
          ? 'border-primary text-primary'
          : 'border-transparent text-on-surface-variant hover:text-on-surface'">
        <span class="flex items-center gap-2">
          <span class="material-symbols-outlined icon-sm">business</span>
          Insurance Firms
        </span>
      </button>

      <button (click)="setTab('config')"
        class="px-5 py-3 text-sm font-bold font-headline transition-all border-b-2 -mb-px"
        [class]="activeTab() === 'config'
          ? 'border-primary text-primary'
          : 'border-transparent text-on-surface-variant hover:text-on-surface'">
        <span class="flex items-center gap-2">
          <span class="material-symbols-outlined icon-sm">tune</span>
          App Configuration
        </span>
      </button>
    </div>

    <!-- Tab Content — each is its own self-contained component -->
    @if (activeTab() === 'procedures') {
      <app-procedure-codes />
    }
    @if (activeTab() === 'insurance') {
      <app-insurance-firms />
    }
    @if (activeTab() === 'config') {
      <app-config />
    }

  </div>
</div>
