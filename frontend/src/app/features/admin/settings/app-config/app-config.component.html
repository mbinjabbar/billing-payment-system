<!-- Alerts -->
@if (error()) {
  <div class="flex items-center gap-3 p-4 rounded-lg bg-error-container/20 border border-error/20 text-error text-sm font-semibold">
    <span class="material-symbols-outlined icon-md">error_outline</span>
    {{ error() }}
  </div>
}
@if (success()) {
  <div class="flex items-center gap-3 p-4 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm font-semibold">
    <span class="material-symbols-outlined icon-md">check_circle</span>
    {{ success() }}
  </div>
}

<div class="max-w-2xl">
  <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 p-8 space-y-6"
    [formGroup]="settingsForm">

    <h3 class="text-lg font-bold font-headline">Clinic Information</h3>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label mb-1.5">
        Clinic / Practice Name <span class="text-error">*</span>
      </label>
      <input type="text" formControlName="clinic_name" placeholder="e.g. ABC Medical Center"
        class="w-full px-4 py-3 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm outline-none focus:border-primary transition" />
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label mb-1.5">
        Address
      </label>
      <textarea formControlName="clinic_address" rows="2" placeholder="e.g. 123 Medical Drive, New York, NY 10001"
        class="w-full px-4 py-3 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm outline-none focus:border-primary transition resize-none">
      </textarea>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label mb-1.5">
          Phone
        </label>
        <input type="text" formControlName="clinic_phone" placeholder="+1 (555) 000-0000"
          class="w-full px-4 py-3 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm outline-none focus:border-primary transition" />
      </div>
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label mb-1.5">
          Email
        </label>
        <input type="email" formControlName="clinic_email" placeholder="billing@clinic.com"
          class="w-full px-4 py-3 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm outline-none focus:border-primary transition" />
      </div>
    </div>

    <div class="border-t border-outline-variant/10 pt-6">
      <h3 class="text-lg font-bold font-headline mb-4">Billing Defaults</h3>
      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label mb-1.5">
            Default Tax Rate (%)
          </label>
          <div class="relative">
            <input type="number" formControlName="default_tax_rate" min="0" max="100"
              class="w-full px-4 py-3 pr-8 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm outline-none focus:border-primary transition" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 font-bold text-on-surface-variant text-sm">%</span>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label mb-1.5">
            Default Due Days
          </label>
          <div class="relative">
            <input type="number" formControlName="default_due_days" min="1"
              class="w-full px-4 py-3 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm outline-none focus:border-primary transition" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-on-surface-variant font-label">days</span>
          </div>
        </div>
      </div>
    </div>

    <div class="border-t border-outline-variant/10 pt-6">
      <h3 class="text-lg font-bold font-headline mb-4">Invoice Settings</h3>
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label mb-1.5">
          Invoice Footer Text
        </label>
        <input type="text" formControlName="invoice_footer" placeholder="e.g. Thank you for your payment."
          class="w-full px-4 py-3 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm outline-none focus:border-primary transition" />
      </div>
    </div>

    <div class="pt-2">
      <button (click)="saveConfig()" [disabled]="savingConfig()"
        class="px-8 py-3 rounded-lg text-sm font-bold text-white disabled:opacity-50 transition font-headline"
        style="background: linear-gradient(135deg, #005bc4 0%, #4388fd 100%);">
        {{ savingConfig() ? 'Saving...' : 'Save Settings' }}
      </button>
    </div>

  </div>
</div>
