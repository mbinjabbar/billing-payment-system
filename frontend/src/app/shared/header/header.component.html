<header class="fixed top-0 w-full h-20 z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/10">
  <div class="flex justify-between items-center px-8 h-full">

    <!-- Logo -->
    <span class="text-2xl font-extrabold text-on-surface tracking-tighter font-headline">MedBilling</span>

    <!-- Right side -->
    <div class="flex items-center gap-6">
      <span class="text-sm tracking-wide uppercase font-semibold text-on-surface/70 font-headline">Biller</span>
      <button (click)="onlogout()" class="bg-surface-container-low hover:bg-surface-container-high transition-all px-4 py-2 rounded-lg text-sm tracking-wide uppercase font-semibold text-primary font-headline">
        Logout
      </button>
    </div>

  </div>
</header>
