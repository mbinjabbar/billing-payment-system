<header class="fixed top-0 w-full h-20 z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/10">
  <div class="flex justify-between items-center px-8 h-full">

    <!-- Logo -->
    <span class="text-2xl font-extrabold text-on-surface tracking-tighter font-headline">MedBilling</span>

    <!-- Right side -->
    <div class="flex items-center gap-6">

      <!-- User info -->
      @if (user()) {
        <div class="text-right">
          <p class="text-sm font-bold text-on-surface font-headline leading-tight">{{ user()!.name }}</p>
          <p class="text-xs font-semibold text-on-surface/50 uppercase tracking-wide font-label">{{ user()!.role }}</p>
        </div>
      }

      <button (click)="onLogout()"
        class="bg-surface-container-low hover:bg-surface-container-high transition-all px-4 py-2 rounded-lg text-sm tracking-wide uppercase font-semibold text-primary font-headline">
        Logout
      </button>
    </div>

  </div>
</header>
